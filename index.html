<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ostermarkt &ndash; Preisliste Betonfiguren</title>
  <style>
    /* Deutschschweizer Basisschrift (lokal installiert) */

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #8da7be;
      --blue-light: #a3b9cc;
      --blue-dark: #7b98b0;
      --blue-deeper: #6a89a3;
      --cream: #f4f0ea;
      --cream-light: #faf7f2;
      --cream-dark: #e8e1d6;
      --stone: #d4cdc2;
      --text-dark: #3b4a56;
      --text-body: #4a5b68;
      --text-muted: #8494a0;
      --white: #ffffff;
      --card-bg: #ffffff;
      --shadow: 0 2px 12px rgba(59, 74, 86, 0.07);
      --shadow-hover: 0 8px 28px rgba(59, 74, 86, 0.13);
      --radius: 14px;
    }

    body {
      font-family: 'Basisschrift', 'Segoe UI', sans-serif;
      background: var(--blue);
      color: var(--text-body);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* === HEADER === */
    header {
      background: var(--blue);
      text-align: center;
      padding: 2.5rem 1.5rem 2rem;
      color: var(--cream-light);
    }

    .header-logo {
      width: 200px;
      max-width: 50vw;
      height: auto;
      margin-bottom: 1rem;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }

    header h1 {
      font-family: 'Basisschrift', Georgia, serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.03em;
      margin-bottom: 0.3rem;
    }

    header .subtitle {
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--cream-dark);
      letter-spacing: 0.04em;
      margin-bottom: 0.8rem;
    }

    header .tagline {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--white);
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 20px;
      padding: 0.3rem 1.2rem;
      letter-spacing: 0.03em;
    }

    .ornament {
      display: block;
      text-align: center;
      color: var(--stone);
      font-size: 1.4rem;
      letter-spacing: 0.6rem;
      padding: 1.5rem 0 0.5rem;
      opacity: 0.5;
    }

    /* === MAIN === */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0.5rem 1.5rem 3rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.6rem;
    }

    /* === CARDS === */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--cream-dark);
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
      border-color: var(--blue);
    }

    .card-img-wrap {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, var(--cream-light), #e4dfd6);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      display: block;
      transition: transform 0.4s ease;
      cursor: pointer;
      padding: 0.6rem;
    }

    .card:hover .card-img {
      transform: scale(1.04);
    }

    .card-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--blue-deeper);
      color: var(--cream-light);
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.3rem 0.8rem;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(59, 74, 86, 0.18);
      pointer-events: none;
      text-align: center;
      line-height: 1.3;
    }

    .card-badge-per {
      display: block;
      font-size: 0.7rem;
      font-weight: 400;
      opacity: 0.85;
    }

    .card-body {
      padding: 0.8rem 1rem 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      border-top: 1px solid var(--cream-dark);
    }

    .card-name {
      font-family: 'Basisschrift', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 0.15rem;
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Multi-image layouts */
    .card-wide {
      grid-column: span 2;
    }

    .card-wide .card-img-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .card-wide .card-img {
      aspect-ratio: 3 / 4;
    }

    .card-triple {
      grid-column: span 3;
    }

    .card-triple .card-img-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
    }

    .card-triple .card-img {
      aspect-ratio: 3 / 4;
    }

    /* === LIGHTBOX === */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(59, 74, 86, 0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      padding: 2rem;
      cursor: pointer;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      animation: lightboxIn 0.25s ease;
    }

    @keyframes lightboxIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.35);
      cursor: default;
    }

    .lightbox-caption {
      text-align: center;
      color: var(--cream-light);
      margin-top: 0.8rem;
      font-family: 'Basisschrift', Georgia, serif;
      font-size: 1.3rem;
      font-weight: 600;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }

    .lightbox-price {
      color: var(--blue-light);
      font-family: 'Basisschrift', sans-serif;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .lightbox-close {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 38px;
      height: 38px;
      background: var(--white);
      border: none;
      border-radius: 50%;
      font-size: 1.3rem;
      color: var(--text-dark);
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .lightbox-close:hover {
      transform: scale(1.1);
    }

    /* === FOOTER === */
    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.82rem;
      max-width: 1100px;
      margin: 0 auto;
      border-top: 1px solid var(--cream-dark);
    }

    .footer-ornament {
      color: var(--stone);
      font-size: 1rem;
      letter-spacing: 0.4rem;
      margin-bottom: 0.4rem;
      opacity: 0.5;
    }

    .loading-msg {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* === RESPONSIVE === */
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .card-wide {
        grid-column: span 2;
      }

      .card-triple {
        grid-column: span 2;
      }

      .card-triple .card-img-wrap {
        grid-template-columns: 1fr 1fr 1fr;
      }

      header h1 {
        font-size: 2rem;
      }
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .card-wide {
        grid-column: span 1;
      }

      .card-triple {
        grid-column: span 1;
      }

      .card-wide .card-img-wrap {
        grid-template-columns: 1fr;
      }

      .card-triple .card-img-wrap {
        grid-template-columns: 1fr 1fr 1fr;
      }

      header {
        padding: 1.5rem 1rem;
      }

      header h1 {
        font-size: 1.6rem;
      }

      main {
        padding: 0.5rem 1rem 2rem;
      }
    }

    @media print {
      body {
        background: white !important;
      }

      header {
        background: var(--blue) !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .card {
        box-shadow: none;
        border: 1px solid #ccc;
        break-inside: avoid;
      }

      .card:hover {
        transform: none;
        border-color: #ccc;
      }

      .card:hover .card-img {
        transform: none;
      }

      .lightbox {
        display: none !important;
      }
    }
  </style>
</head>

<body>

  <header>
    <img class="header-logo" src="images/logo.jpg" alt="BETON &ndash; Handwerk mit Herz">
    <h1>Preisliste</h1>
    <p class="subtitle">Handgefertigte Betonfiguren &middot; Alle Preise in CHF</p>
    <span class="tagline">Jedes St&uuml;ck ein Unikat</span>
  </header>

  <div class="ornament" aria-hidden="true">&mdash; &#x2740; &mdash;</div>

  <main>
    <div class="grid" id="product-grid">
      <div class="loading-msg">Produkte werden geladen&hellip;</div>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightbox-close" aria-label="Schliessen">&times;</button>
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
      <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
  </div>

  <footer>
    <div class="footer-ornament" aria-hidden="true">&mdash; &#x2740; &mdash;</div>
    <span id="footer-text">Alle Figuren sind handgefertigt &ndash; jedes St&uuml;ck ist ein Unikat.</span>
  </footer>

  <script>
    (function () {
      var grid = document.getElementById('product-grid');
      var lightbox = document.getElementById('lightbox');
      var lightboxImg = document.getElementById('lightbox-img');
      var lightboxCaption = document.getElementById('lightbox-caption');
      var lightboxClose = document.getElementById('lightbox-close');

      function formatPrice(price) {
        var formatted = price.toFixed(2).replace('.00', '.\u2013');
        return 'Fr.\u00a0' + formatted;
      }

      function openLightbox(src, name, price) {
        lightboxImg.src = src;
        lightboxImg.alt = name;
        lightboxCaption.innerHTML = name + '<br><span class="lightbox-price">' + formatPrice(price) + '</span>';
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
      }

      lightboxClose.addEventListener('click', function (e) {
        e.stopPropagation();
        closeLightbox();
      });

      lightbox.addEventListener('click', function (e) {
        if (e.target === lightbox) closeLightbox();
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeLightbox();
      });

      function buildCard(product) {
        var layout = product.layout || 'single';
        var card = document.createElement('div');
        card.className = 'card';
        if (layout === 'wide') card.className += ' card-wide';
        if (layout === 'triple') card.className += ' card-triple';

        var imgWrap = document.createElement('div');
        imgWrap.className = 'card-img-wrap';

        product.images.forEach(function (src) {
          var img = document.createElement('img');
          img.className = 'card-img';
          img.src = src;
          img.alt = product.name;
          img.loading = 'lazy';
          img.addEventListener('click', function () {
            openLightbox(src, product.name, product.price);
          });
          imgWrap.appendChild(img);
        });

        var badge = document.createElement('span');
        badge.className = 'card-badge';
        badge.innerHTML = formatPrice(product.price);
        if (product.pricePer) {
          badge.innerHTML += '<span class="card-badge-per">' + product.pricePer + '</span>';
        }
        imgWrap.appendChild(badge);

        var body = document.createElement('div');
        body.className = 'card-body';

        var nameEl = document.createElement('div');
        nameEl.className = 'card-name';
        nameEl.textContent = product.name;
        body.appendChild(nameEl);

        if (product.description) {
          var descEl = document.createElement('div');
          descEl.className = 'card-desc';
          descEl.textContent = product.description;
          body.appendChild(descEl);
        }

        card.appendChild(imgWrap);
        card.appendChild(body);
        return card;
      }

      var embeddedData = {
        currency: 'CHF',
        updated: '2025-03',
        products: [
      { id: 'wichtel', name: 'Wichtel', description: 'Verschiedene Farben', price: 18.00, pricePer: 'pro St\u00fcck', images: ['images/wichtel.png'] },
      { id: 'wichtel-3er-set', name: 'Wichtel 3er Set', description: 'Gold \u00b7 nur im Set erh\u00e4ltlich', price: 30.00, pricePer: 'pro Set', images: ['images/wichtel-3er-set.png'] },
      { id: 'haende', name: 'H\u00e4nde', price: 15.00, pricePer: 'pro St\u00fcck', images: ['images/haende.png'] },
      { id: 'hase-gross', name: 'Hase gross', description: 'Sitzend oder stehend \u00b7 patiniert', price: 40.00, pricePer: 'pro St\u00fcck', images: ['images/hase-gross-sitzend.png', 'images/hase-gross-stehend.png'], layout: 'wide' },
      { id: 'vogeltraenke-klein', name: 'Vogeltr\u00e4nke klein', description: 'Mit Mosaik \u00b7 patiniert', price: 35.00, pricePer: 'pro St\u00fcck', images: ['images/vogeltraenke-klein.png'] },
      { id: 'huhn', name: 'Huhn', description: 'Verschiedene Modelle \u00b7 patiniert mit floralen Mustern', price: 30.00, pricePer: 'pro St\u00fcck', images: ['images/huhn-1.png', 'images/huhn-2.png', 'images/huhn-3.png'], layout: 'triple' }
        ]
      };

      function renderProducts(data) {
        grid.innerHTML = '';
        data.products.forEach(function (product) {
          grid.appendChild(buildCard(product));
        });
        var footerText = document.getElementById('footer-text');
        footerText.textContent =
          'Alle Figuren sind handgefertigt \u2013 jedes St\u00fcck ist ein Unikat. Preise Stand ' +
          data.updated + '.';
      }

      fetch('prices/prices.json')
        .then(function (res) { return res.json(); })
        .then(function (data) { renderProducts(data); })
        .catch(function () { renderProducts(embeddedData); });
    })();
  </script>

</body>

</html>
